{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SNS{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'sns/style.css' %}">
</head>
<body>
    <table class="body_content">
        <tr class="body_content_inner">
            <td class="login_table" width="100%">
                <table class="login_table_inner">
                    <tr><th width="150px">menu</th></tr>
                    <tr>
                        <td><a href="{% url 'index' %}">top</a></td>
                        <td><a href="{% url 'post' %}">post</a></td>
                        <td><a href="{% url 'groups' %}">group</a></td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <th width="150px">login user:</th>
            <td>"{{login_user}}"</td>
        </tr>
    </table>

    <div class="header">{% block header %}{% endblock %}</div>
    <div class="content">{% block content %}{% endblock %}</div>

    <hr>
    <div>
        <span style="float:left;font-weight:bold;">
            <a href="/admin/logout?next=/sns/">[logout]</a>
        </span>
    </div>
</body>
</html>
