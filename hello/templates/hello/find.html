{% load static %}
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>{{title}}</title>
    <link rel="stylesheet" type="text/css"
        href="{% static 'hello/css/style.css' %}" />
  </head>
  <body>
    <h1>{{title}}</h1>
    <p>{{message|safe}}</p>
    <form action="{% url 'find' %}" method="post">
      {% csrf_token %}
      {{form.as_p}}
      <input type="submit" value="click">
    </form>
    <hr>
    <table>
      <tr>
        <th>id</th>
        <th>name</th>
        <th>age</th>
        <th>mail</th>
        <th>birthday</th>
        <th></th>
        <th></th>
      </tr>
      {% for item in data %}
      <tr>
        <td>{{item.id}}</td>
        <td>{{item.name}}</td>
        <td>{{item.age}}</td>
        <td>{{item.mail}}</td>
        <td>{{item.birthday}}</td>
        <td><a href="{% url 'edit' item.id %}">Edit</a></td>
        <td><a href="{% url 'delete' item.id %}">Delete</a></td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
